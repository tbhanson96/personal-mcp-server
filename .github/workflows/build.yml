name: Build

on: push

permissions:
  contents: read
  packages: write

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: node_modules
          key: dependencies-${{ github.sha }}

  build:
    name: Build project
    runs-on: ubuntu-24.04-arm
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: dependencies-${{ github.sha }}

      - name: Build
        run: npm run build

  test:
    name: Test project
    runs-on: ubuntu-24.04-arm
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: dependencies-${{ github.sha }}

      - name: Test
        run: npm test

      - name: Audit
        run: npm audit

  deploy:
    name: Deploy
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-24.04-arm
    needs: [build, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: actions/cache@v4
        with:
          path: node_modules
          key: dependencies-${{ github.sha }}

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: npm run package

      - name: Deploy image
        run: npm run deploy
